<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>棒バトトピック | 棒人間バトルまとめ</title>
  <meta name="description" content="ニコニコ・YouTube・Twitterの棒人間バトル（棒バト）の話題を1日2回自動更新でまとめるトピックサイト。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="memo-paper">
        <svg class="mascot" viewBox="0 0 72 84" aria-hidden="true">
          <!-- 棒人間（バトルポーズ） -->
          <g class="ink" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="34" cy="14" r="10"/>
            <path d="M34 24 L33 52"/>
            <path d="M33 32 L55 23"/>   <!-- パンチの腕 -->
            <path d="M33 33 L16 41"/>   <!-- もう片方の腕 -->
            <path d="M33 52 L21 78"/>   <!-- 左脚 -->
            <path d="M33 52 L47 74"/>   <!-- 右脚（踏み込み） -->
          </g>
          <g class="motion" fill="none" stroke-width="3.5" stroke-linecap="round">
            <path d="M58 20 L66 17"/>
            <path d="M58 26 L65 25"/>
          </g>
        </svg>
        <h1 class="logo">棒バト<span>トピック</span></h1>
        <p class="tagline">ニコニコ・YouTube・Twitter の棒人間バトルを自動まとめ</p>
        <p class="updated" id="updated">読み込み中…</p>
      </div>
    </div>
  </header>

  <nav class="tabs wrap" id="section-nav">
    <a href="#pickup" class="tab-link">ピックアップ</a>
    <a href="#niconico" class="tab-link">ニコニコ</a>
    <a href="#youtube" class="tab-link">YouTube</a>
    <a href="#twitter" class="tab-link">Twitter</a>
  </nav>

  <main class="wrap">
    <!-- ピックアップ -->
    <section id="pickup">
      <h2 class="section-title">🔥 ピックアップ</h2>
      <p class="section-sub">各ソースの新着・人気をまとめてチェック</p>
      <div class="grid" id="pickup-grid"></div>
    </section>

    <!-- ニコニコ -->
    <section id="niconico">
      <h2 class="section-title">📺 ニコニコ「棒バトランキング」</h2>
      <p class="section-sub">年タグ別の再生数ランキング</p>
      <div class="year-tabs" id="year-tabs"></div>
      <div class="grid" id="niconico-grid"></div>
    </section>

    <!-- YouTube -->
    <section id="youtube">
      <h2 class="section-title">▶️ YouTube</h2>
      <p class="section-sub">「棒バト / 棒人間バトル」の最新・人気動画</p>
      <div class="subtabs" id="yt-subtabs">
        <button class="subtab active" data-yt="recent">新着</button>
        <button class="subtab" data-yt="popular">人気</button>
      </div>
      <div class="grid" id="youtube-grid"></div>
    </section>

    <!-- Twitter -->
    <section id="twitter">
      <h2 class="section-title">🐦 Twitter (X)</h2>
      <div class="notice" id="twitter-notice"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>データは1日2回自動更新。ニコニコ動画スナップショット検索API v2 / YouTube Data API v3 を利用。</p>
      <p class="small">本サイトは各動画へのリンク集です。著作権は各投稿者に帰属します。</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
